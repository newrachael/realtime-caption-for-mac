<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Realtime Caption for Mac architecture</title>
  <desc id="desc">System diagram showing approved macOS audio capture flowing through PCM conversion, OpenAI Realtime Translation, transcript parsing, caption buffering, and the subtitle overlay, with local settings and diagnostics boundaries.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <marker id="soft-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 30px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 400 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .lane-title { font: 700 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; letter-spacing: .04em; }
      .box-title { font: 700 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .box-text { font: 400 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .small { font: 400 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .badge { font: 700 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 18; }
      .local { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.5; rx: 18; }
      .network { fill: #eff6ff; stroke: #93c5fd; stroke-width: 1.5; rx: 18; }
      .privacy { fill: #ecfdf5; stroke: #86efac; stroke-width: 1.5; rx: 18; }
      .warn { fill: #fff7ed; stroke: #fdba74; stroke-width: 1.5; rx: 18; }
      .line { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .soft-line { stroke: #64748b; stroke-width: 1.8; fill: none; marker-end: url(#soft-arrow); stroke-dasharray: 6 5; }
      .divider { stroke: #cbd5e1; stroke-width: 1; stroke-dasharray: 6 6; }
    </style>
  </defs>

  <rect class="bg" width="1280" height="760"/>

  <text x="48" y="56" class="title">Realtime Caption for Mac Architecture</text>
  <text x="48" y="84" class="subtitle">A debuggable macOS pipeline for approved audio capture, OpenAI Realtime Translation, and live subtitle rendering.</text>

  <rect x="40" y="122" width="1200" height="450" class="panel"/>
  <text x="66" y="154" class="lane-title">LIVE RUNTIME FLOW</text>

  <rect x="66" y="196" width="170" height="112" class="local"/>
  <text x="88" y="226" class="box-title">User Consent</text>
  <text x="88" y="252" class="box-text">Screen &amp; System</text>
  <text x="88" y="272" class="box-text">Audio Recording</text>
  <text x="88" y="292" class="small">macOS permission gate</text>

  <rect x="286" y="196" width="184" height="112" class="local"/>
  <text x="308" y="226" class="box-title">ScreenCaptureKit</text>
  <text x="308" y="252" class="box-text">System audio or</text>
  <text x="308" y="272" class="box-text">selected app audio</text>
  <text x="308" y="292" class="small">excludes current process</text>

  <rect x="520" y="196" width="174" height="112" class="local"/>
  <text x="542" y="226" class="box-title">PCM Converter</text>
  <text x="542" y="252" class="box-text">AudioPCMConverter</text>
  <text x="542" y="272" class="box-text">24 kHz mono PCM16</text>
  <text x="542" y="292" class="small">send-ready audio frames</text>

  <rect x="744" y="196" width="176" height="112" class="local"/>
  <text x="766" y="226" class="box-title">Send Buffer</text>
  <text x="766" y="252" class="box-text">AudioSendBuffer</text>
  <text x="766" y="272" class="box-text">bounded packet queue</text>
  <text x="766" y="292" class="small">append input_audio_buffer</text>

  <rect x="970" y="196" width="216" height="112" class="network"/>
  <text x="992" y="226" class="box-title">OpenAI Realtime</text>
  <text x="992" y="252" class="box-text">/v1/realtime/translations</text>
  <text x="992" y="272" class="box-text">gpt-realtime-translate</text>
  <text x="992" y="292" class="small">WebSocket session</text>

  <path d="M236 252 H276" class="line"/>
  <path d="M470 252 H510" class="line"/>
  <path d="M694 252 H734" class="line"/>
  <path d="M920 252 H960" class="line"/>

  <rect x="766" y="384" width="190" height="112" class="local"/>
  <text x="788" y="414" class="box-title">Event Parser</text>
  <text x="788" y="440" class="box-text">RealtimeEventParser</text>
  <text x="788" y="460" class="box-text">transcript deltas only</text>
  <text x="788" y="480" class="small">audio-only output is failure</text>

  <rect x="526" y="384" width="190" height="112" class="local"/>
  <text x="548" y="414" class="box-title">Caption Buffer</text>
  <text x="548" y="440" class="box-text">RealtimeTranscriptBuffer</text>
  <text x="548" y="460" class="box-text">RollingCaptionBuffer</text>
  <text x="548" y="480" class="small">stabilizes readable text</text>

  <rect x="286" y="384" width="190" height="112" class="local"/>
  <text x="308" y="414" class="box-title">Overlay UI</text>
  <text x="308" y="440" class="box-text">AppKit panel</text>
  <text x="308" y="460" class="box-text">SwiftUI subtitle view</text>
  <text x="308" y="480" class="small">always-on-top captions</text>

  <path d="M1078 308 V440 H966" class="line"/>
  <path d="M766 440 H726" class="line"/>
  <path d="M526 440 H486" class="line"/>

  <path d="M832 308 V350" class="soft-line"/>
  <text x="846" y="346" class="small">translated audio deltas are logged as counters, not captions</text>

  <line x1="66" y1="344" x2="1186" y2="344" class="divider"/>

  <rect x="40" y="604" width="370" height="116" class="privacy"/>
  <text x="66" y="636" class="lane-title">LOCAL SECRETS &amp; SETTINGS</text>
  <text x="66" y="666" class="box-title">Keychain + UserDefaults</text>
  <text x="66" y="692" class="box-text">API key stays in macOS Keychain.</text>
  <text x="66" y="712" class="box-text">Language, opacity, scope, and safety ID stay local.</text>

  <rect x="455" y="604" width="370" height="116" class="warn"/>
  <text x="481" y="636" class="lane-title">DIAGNOSTICS</text>
  <text x="481" y="666" class="box-title">Logs + optional WAV dumps</text>
  <text x="481" y="692" class="box-text">Counters, event names, and failure reasons are logged.</text>
  <text x="481" y="712" class="box-text">Transcript text is redacted; WAV dumps are local debug files.</text>

  <rect x="870" y="604" width="370" height="116" class="network"/>
  <text x="896" y="636" class="lane-title">NETWORK BOUNDARY</text>
  <text x="896" y="666" class="box-title">OpenAI API only while running</text>
  <text x="896" y="692" class="box-text">Captured PCM16 audio is streamed to Realtime Translation.</text>
  <text x="896" y="712" class="box-text">No fallback transcription model is used.</text>

  <path d="M225 604 V550 H378 V506" class="soft-line"/>
  <path d="M640 604 V550 H607 V506" class="soft-line"/>
  <path d="M1055 604 V550 H1078 V318" class="soft-line"/>

  <rect x="48" y="102" width="178" height="32" rx="16" fill="#e2e8f0"/>
  <text x="70" y="123" class="badge">Native macOS app</text>
  <rect x="236" y="102" width="182" height="32" rx="16" fill="#dbeafe"/>
  <text x="258" y="123" class="badge">OpenAI Realtime API</text>
  <rect x="428" y="102" width="184" height="32" rx="16" fill="#dcfce7"/>
  <text x="450" y="123" class="badge">Explicit privacy boundary</text>
</svg>
